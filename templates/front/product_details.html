{% extends 'front/master.html' %}

{% block content %}
<style>
  :root {
    --bg: #ffffff;
    --surface: #f4f4f4;
    --text: #000000;
    --muted: #666666;
    --border: #e5e5e5;
    --black: #000000;
  }

  .pd-page {
    background: var(--bg);
    min-height: calc(100vh - 80px);
    padding: 60px 24px;
  }

  .pd-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 40px;
    transition: opacity 0.2s;
  }

  .pd-back:hover {
    opacity: 0.6;
    text-decoration: none;
    color: var(--text);
  }

  .pd-card {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }

  /* LEFT - Image */
  .pd-img-wrap {
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pd-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* RIGHT - Content */
  .pd-right {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .pd-badge {
    display: inline-block;
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 24px;
    align-self: flex-start;
  }

  .pd-title {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
    text-transform: uppercase;
  }

  .pd-desc-text {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 32px;
  }

  .pd-price-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    margin-bottom: 40px;
  }

  .pd-price-num {
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
  }

  /* QTY */
  .pd-qty-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
  }

  .pd-qty-ctrl {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .pd-qty-btn {
    width: 48px;
    height: 48px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    color: var(--text);
    transition: background 0.2s;
  }

  .pd-qty-btn:hover {
    background: var(--surface);
  }

  .pd-qty-num {
    width: 48px;
    text-align: center;
    font-weight: 600;
  }

  .pd-subtotal {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pd-subtotal strong {
    color: var(--text);
  }

  /* BUTTON */
  .pd-btn-cart {
    width: 100%;
    background: var(--black);
    color: #ffffff;
    border: 1px solid var(--black);
    border-radius: 4px;
    padding: 20px;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .pd-btn-cart:hover {
    background: #ffffff;
    color: var(--black);
  }

  .pd-success {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0;
    transition: 0.3s;
    margin-top: 16px;
  }

  .pd-success.show {
    opacity: 1;
  }

  @media (max-width: 900px) {
    .pd-card { grid-template-columns: 1fr; gap: 40px; }
    .pd-img-wrap { height: 400px; }
    .pd-title { font-size: 36px; }
  }
</style>

<div class="pd-page container">

  <a href="{{ url_for('home') }}" class="pd-back">← Back to Store</a>

  <div class="pd-card">

    <!-- LEFT -->
    <div class="pd-img-wrap">
      <img src="{{ product.image }}">
    </div>

    <!-- RIGHT -->
    <div class="pd-right">

      <span class="pd-badge">{{ product.category or 'Keyz Collection' }}</span>

      <h1 class="pd-title">{{ product.name }}</h1>
      <p class="pd-desc-text">{{ product.description }}</p>

      <div class="pd-price-row">
        <span style="margin-top: 5px; font-weight: 500;">៛</span>
        <span class="pd-price-num">{{ product.price }}</span>
      </div>

      <div class="pd-qty-row">
        <div class="pd-qty-ctrl">
          <button class="pd-qty-btn" onclick="changeQty(-1)">-</button>
          <span class="pd-qty-num" id="qty-display">1</span>
          <button class="pd-qty-btn" onclick="changeQty(1)">+</button>
        </div>

        <span class="pd-subtotal">Total: <strong id="subtotal">៛{{ product.price }}</strong></span>
      </div>

      <button class="pd-btn-cart" id="cart-btn" onclick="addToCart()">
        Add to Bag
      </button>

      <div class="pd-success" id="success-msg">
        Added to Bag ✓
      </div>

    </div>

  </div>
</div>

<script>
let qty = 1;
let price = {{ product.price }};
let productId = {{ product.id }};

function changeQty(v){
  qty = Math.max(1, qty + v);
  document.getElementById("qty-display").innerText = qty;
  document.getElementById("subtotal").innerText = "៛" + (qty * price).toFixed(2);
}

function addToCart(){

  fetch("/cart/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      product_id: productId,
      qty: qty
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {
      document.getElementById("success-msg").classList.add("show");
      setTimeout(() => {
        document.getElementById("success-msg").classList.remove("show");
      }, 2000);
    } else {
      alert("Failed to add to cart");
    }

  })
  .catch(() => {
    alert("Server error");
  });

}
</script>
{% endblock %}
