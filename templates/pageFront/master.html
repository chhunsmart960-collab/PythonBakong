<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keyz Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap & Font Awesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #000000;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      border-bottom: 1px solid #e5e5e5;
      background: #ffffff;
    }

    .brand h4 {
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #000000;
      text-transform: uppercase;
    }

    .brand h4 span {
      font-weight: 300;
      color: #666666;
    }

    .brand a {
      text-decoration: none;
    }

    .icons a {
      color: #000000;
      font-size: 1.2rem;
      margin-left: 20px;
      transition: color 0.2s;
    }

    .icons a:hover {
      color: #666666;
    }

    /* Footer Styling */
    footer {
      background-color: #000000;
      color: #ffffff;
      margin-top: auto;
    }

    footer h5, footer h6 {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    footer p {
      color: #a0a0a0;
      font-size: 14px;
      line-height: 1.6;
    }

    footer a {
      color: #a0a0a0;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #ffffff;
      text-decoration: none;
    }

    footer li {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .social a {
      color: #ffffff;
      margin-right: 15px;
      font-size: 1.2rem;
    }

    .bottom {
      border-top: 1px solid #333333;
      padding: 20px 0;
      text-align: center;
      font-size: 13px;
      color: #666666;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="py-3 sticky-top">
    <div class="container d-flex justify-content-between align-items-center">

      <!-- Left side: name -->
      <div class="brand d-flex align-items-center">
          <a href="{{ url_for('home') }}">
              <h4 class="mb-0">KEYZ<span>STORE</span></h4>
          </a>
      </div>

      <!-- Right side: icons -->
      <div class="icons d-flex align-items-center">
        <a href="{{ url_for('login') }}"><i class="fa fa-user"></i></a>
        <a href="#"><i class="fa fa-heart"></i></a>
        <a href="{{ url_for('cart') }}"><i class="fa fa-shopping-cart"></i></a>
      </div>

    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-fill">
      {% block content %}{% endblock %}
  </main>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container py-5 d-flex flex-wrap justify-content-between">
      <div class="mb-4" style="max-width: 300px;">
        <h5>Keyz Store</h5>
        <p>Premium quality goods for everyday style and comfort. Elevate your lifestyle with our exclusive, minimalist collections.</p>
      </div>

      <div class="mb-4">
        <h6>Quick Links</h6>
        <ul class="list-unstyled">
          <li><a href="{{ url_for('home') }}">Home</a></li>
          <li><a href="{{ url_for('about') }}">About</a></li>
          <li><a href="{{ url_for('contact') }}">Contact</a></li>
        </ul>
      </div>

      <div class="mb-4">
        <h6>Follow Us</h6>
        <div class="social">
          <a href="#"><i class="fab fa-facebook"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
      </div>
    </div>

    <div class="bottom">
      &copy; 2026 Keyz Store | All Rights Reserved
    </div>
  </footer>

  <!-- ===== JS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
