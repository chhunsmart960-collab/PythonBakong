<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyz Store | Admin Login</title>
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #000000;
        }

        .login-box {
            width: 400px;
            background: #ffffff;
            padding: 50px 40px;
            border: 1px solid #e5e5e5;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border-radius: 4px;
        }

        .login-logo {
            font-size: 28px;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #000000;
        }

        .login-logo span {
            font-weight: 300;
            color: #666666;
        }

        .form-group {
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #000000;
            background: #ffffff;
        }

        .btn-primary {
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            padding: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            margin-top: 30px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Minimalist Alert */
        .alert-error {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            padding: 14px 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert-error::before {
            content: "!";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            font-size: 12px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="login-logo">
        Keyz<span>Store</span> | Admin
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
            <div class="alert-error">
                {{ message }}
            </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('do_login', next=request.args.get('next')) }}">
        <div class="form-group">
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-primary">Secure Login</button>
    </form>

    <div class="footer-text">
        &copy; 2026 Keyz Store
    </div>
</div>

</body>
</html>
