<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}{% endblock %}</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="{{ url_for('static',filename='admin/plugins/fontawesome-free/css/all.min.css') }}">
  <!-- Theme style -->
  <link rel="stylesheet" href="{{ url_for('static',filename='admin/dist/css/adminlte.min.css') }}">
  <!-- Main.css -->
  <link rel="stylesheet" href="{{ url_for('static',filename='admin/main.css') }}">

  <!-- Keyz Store Global Admin Overrides (B&W Theme) -->
  <style>
    body, .wrapper, .main-sidebar, .main-header, .content-wrapper, .main-footer, .card, .btn, .table, .form-control {
      font-family: 'Inter', sans-serif !important;
    }

    /* Layout & Header */
    .content-wrapper { background-color: #f9f9f9 !important; }
    .main-header { border-bottom: 1px solid #e5e5e5 !important; background: #ffffff !important; }
    .main-footer { background: #ffffff !important; border-top: 1px solid #e5e5e5 !important; color: #666666 !important; font-size: 13px; }

    /* Typography */
    h1, h2, h3, h4, h5 { font-weight: 800 !important; text-transform: uppercase; letter-spacing: -0.5px; color: #000000 !important; }
    .breadcrumb-item a { color: #666666 !important; font-weight: 500; }
    .breadcrumb-item.active { color: #000000 !important; font-weight: 600; }

    /* Sidebar */
    .main-sidebar { background-color: #000000 !important; border-right: none !important; }
    .brand-link { border-bottom: 1px solid #222222 !important; color: #ffffff !important; text-align: center; padding: 20px 0 !important; }
    .brand-text { font-weight: 800 !important; text-transform: uppercase; letter-spacing: -0.5px; font-size: 18px; }
    .user-panel { border-bottom: 1px solid #222222 !important; padding-bottom: 15px !important; margin-bottom: 15px !important; }
    .user-panel .info a { color: #ffffff !important; font-weight: 600 !important; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
    .nav-sidebar .nav-item .nav-link { color: #999999 !important; border-radius: 4px !important; transition: all 0.2s ease; margin-bottom: 4px !important; }
    .nav-sidebar .nav-item .nav-link:hover { color: #ffffff !important; background: #222222 !important; }
    .nav-sidebar .nav-item .nav-link.active { background: #ffffff !important; color: #000000 !important; font-weight: 600 !important; box-shadow: none !important; }

    /* Cards & Tables */
    .card { border: 1px solid #e5e5e5 !important; border-radius: 4px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.03) !important; background: #ffffff !important; }
    .card-header { background: #ffffff !important; border-bottom: 1px solid #e5e5e5 !important; padding: 20px !important; border-radius: 4px 4px 0 0 !important; }
    .table th, .table td { border-top: 1px solid #e5e5e5 !important; padding: 16px !important; vertical-align: middle !important; color: #000000 !important; border-bottom: none !important; }
    .table-striped tbody tr:nth-of-type(odd) { background-color: #f9f9f9 !important; }
    .bg-primary, .bg-info, .bg-success, .bg-warning, .bg-danger { background-color: #000000 !important; color: #ffffff !important; }
    .bg-primary th { font-weight: 600 !important; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: #ffffff !important; border: none !important; }

    /* Buttons */
    .btn { text-transform: uppercase; font-weight: 600 !important; font-size: 13px !important; letter-spacing: 0.5px; border-radius: 4px !important; padding: 10px 24px !important; transition: all 0.3s ease !important; box-shadow: none !important; }
    .btn-primary { background: #000000 !important; border: 1px solid #000000 !important; color: #ffffff !important; }
    .btn-primary:hover { background: #ffffff !important; color: #000000 !important; }
    .btn-danger { background: #ffffff !important; border: 1px solid #000000 !important; color: #000000 !important; }
    .btn-danger:hover { background: #f9f9f9 !important; }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Left navbar links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button" style="color: #000;"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-none d-sm-inline-block">
        <a href="{{ url_for('home') }}" class="nav-link" style="color: #000; font-weight: 500;">Storefront</a>
      </li>
    </ul>

    <!-- Right navbar links -->
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a class="nav-link" data-widget="fullscreen" href="#" role="button" style="color: #000;">
          <i class="fas fa-expand-arrows-alt"></i>
        </a>
      </li>
    </ul>
  </nav>
  <!-- /.navbar -->

  <!-- Main Sidebar Container -->
  <aside class="main-sidebar elevation-4">
    <!-- Brand Logo -->
    <a href="#" class="brand-link">
      <span class="brand-text font-weight-light">Keyz Store</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar user panel -->
      <div class="user-panel mt-3 pb-3 mb-3 d-flex align-items-center">
        <div class="info w-100 text-center">
          <a href="#" class="d-block"><i class="fas fa-user-circle mr-2"></i> {{session.username }}</a>
        </div>
      </div>

      <!-- Sidebar Menu -->
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
            <li class="nav-item">
            <a href="{{ url_for('dashboards') }}" class="nav-link {{ 'active' if module == 'dashboard' }}">
              <i class="nav-icon fas fa-th"></i>
              <p>Dashboard</p>
            </a>
          </li>
            <li class="nav-item">
            <a href="{{ url_for('products') }}" class="nav-link {{ 'active' if module == 'product' }}">
              <i class="nav-icon fab fa-product-hunt"></i>
              <p>Products</p>
            </a>
          </li>
            <li class="nav-item">
            <a href="{{ url_for('categorys') }}" class="nav-link {{ 'active' if module == 'category' }}">
              <i class="nav-icon fas fa-cubes"></i>
              <p>Categories</p>
            </a>
          </li>
            <li class="nav-item">
            <a href="{{ url_for('orders') }}" class="nav-link {{ 'active' if module == 'order' }}">
              <i class="nav-icon fas fa-credit-card"></i>
              <p>Orders</p>
            </a>
          </li>
            <li class="nav-item">
            <a href="{{ url_for('customers') }}" class="nav-link {{ 'active' if module == 'customer' }}">
              <i class="nav-icon fas fa-users"></i>
              <p>Customers</p>
            </a>
          </li>
            <li class="nav-item">
            <a href="{{ url_for('users') }}" class="nav-link {{ 'active' if module == 'user' }}">
              <i class="nav-icon fas fa-key"></i>
              <p>Users</p>
            </a>
          </li>
          <li class="nav-item mt-4">
            <a href="{{ url_for('logout') }}" class="nav-link {{ 'active' if module == 'logout' }}">
              <i class="nav-icon fas fa-sign-out-alt"></i>
              <p>Logout</p>
            </a>
          </li>
        </ul>
      </nav>
      <!-- /.sidebar-menu -->
    </div>
    <!-- /.sidebar -->
  </aside>

  <!-- Content Wrapper. Contains page content -->
  {% block content %}
  {% endblock %}
  <!-- /.content-wrapper -->

  <!-- Main Footer -->
  <footer class="main-footer">
    <div class="float-right d-none d-sm-inline font-weight-bold text-uppercase" style="letter-spacing: 0.5px; font-size: 11px;">
      Admin Portal
    </div>
    <strong>Copyright &copy; 2026 Keyz Store.</strong> All rights reserved.
  </footer>
</div>
<!-- ./wrapper -->

<!-- REQUIRED SCRIPTS -->
<!-- jQuery -->
<script src="{{ url_for('static',filename='admin/plugins/jquery/jquery.min.js') }}"></script>
<!-- Bootstrap 4 -->
<script src="{{ url_for('static',filename='admin/plugins/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<!-- AdminLTE App -->
<script src="{{ url_for('static',filename='admin/dist/js/adminlte.min.js') }}"></script>
</body>
</html>
